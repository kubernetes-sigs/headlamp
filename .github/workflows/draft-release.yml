name: Create Release Draft

on:
  workflow_dispatch:
    inputs:
      releaseName:
        description: 'Name for this release (should be equivalent to the tag without the v prefix)'
        required: true
        default: 'X.Y.Z'

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write
      issues: write
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous release tag
        id: get_prev_tag
        run: |
          PREV_TAG=$(git tag -l 'v*' --sort=-version:refname | head -n 1)
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"

      - name: Create Release Coordination Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const releaseName = '${{ github.event.inputs.releaseName }}';
            const prevTag = '${{ steps.get_prev_tag.outputs.prev_tag }}';

            const issueBody = `# Release testing

            NOTE: the release isn't frozen yet for testing.

            Please write a comment if you're going to test an item and if you've completed testing an item.

            - [ ] **Test web sockets**
              - Run the app in static server mode (\`./backend/headlamp-server -static-html-dir ./frontend/build...\`)
              - Open the pods list view
              - Delete a pod using kubectl
              - Verify that the list reflects the changes

            - [ ] **App: Run with plugins**
              - Build app with plugins: \`make && make app\`
              - Run the app (UI should load in less than 1 minute)
              - Verify plugins are present: App Catalog, Prometheus, App Catalog

            - [ ] **App: Test Prometheus plugin**
              - Run the app
              - Go to the Pods page and choose a pod
              - Verify the Prometheus plugin shows at the top and displays correctly

            - [ ] **Image: Test Prometheus plugin**
              - Run headlamp from image
              - Go to the Pods page and choose a pod
              - Verify the Prometheus plugin shows at the top and displays correctly

            - [ ] **App: Test Plugin Catalog**
              - Run the app
              - Verify the Plugin Catalog sidebar item is available and open it
              - Verify plugins appear from ArtifactHub
              - Install a plugin
              - Verify the plugin shows as installed
              - Delete the plugin
              - Verify the plugin shows as available to install

            - [ ] **Test creating a resource through edit button**
              - Open Headlamp via app or image
              - Choose a cluster where you have admin rights
              - Click Create (bottom left), add a resource (e.g., ConfigMap), and apply
              - Verify the resource is created

            - [ ] **Check Workloads page**
              - Open Headlamp via app or image
              - Go to the Workloads page of a cluster with diverse resource types
              - Verify resources and top charts display correctly

            - [ ] **Check cluster renaming**
              - Open Headlamp via app or image
              - Open cluster settings
              - Rename the cluster
              - Verify the cluster name changed
              - Reload the app
              - Verify the new name persists

            - [ ] **App: Check running on Mac**
              - Open app on Mac
              - Verify it loaded in less than 30 seconds

            - [ ] **App: Check running on Windows**
              - Open app on Windows
              - Verify it loaded in less than 30 seconds

            - [ ] **App: Check running on Linux**
              - Open app on Linux
              - Verify it loaded in less than 30 seconds

            - [ ] **App: Load more than one cluster**
              - Open app
              - Add a new cluster from a kubeconfig file
              - Add another cluster from another kubeconfig file

            - [ ] **Flatpak: Install a plugin**
              - Install a plugin from the app catalog
              - Verify it doesn't fail on cross-device linking

            - [ ] **App: Load kubeconfig with context != cluster name**
              - Open app
              - Click Add Cluster
              - Choose a kubeconfig where a cluster name differs from the context name
              - Verify the cluster loads successfully

            - [ ] **Allowed Namespaces**
              - Open Headlamp in any flavor
              - Configure allowed namespaces in cluster settings
              - Verify views honor allowed namespaces
              - Verify the map honors allowed namespaces

            - [ ] **Create resources in the intended cluster**
              - Reproduce: "Create dialog doesn't update cluster when it's changed" (Issue #2441)
              - Verify resource creation targets the intended cluster

            - [ ] **Check these plugins have settings**
              - Build a new app
              - Go to Settings > Plugins
              - Click each plugin to verify settings render
              - Plugins: Prometheus, App catalog, Plugin catalog

            ---

            ## Changelog

            @${{ github.actor }}, please run the following command to generate the changelog and paste it here:

            \`\`\`bash
            git log --oneline --cherry --topo-order ${prevTag}..HEAD
            \`\`\`

            ---

            ## Release Notes

            Please fill in the release notes below in the following format:

            ## ✨ Enhancements:
            * Feature 1
            * Feature 2

            ## 🐞 Bug fixes
            * Fix 1
            * Fix 2

            ## 💻 Development
            * Development experience related change 1
            * Development experience related change 2

            ## 📖 Documentation
            * Docs change 1
            * Docs change 2
            `;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release ${releaseName} - Coordination`,
              body: issueBody,
              labels: ['release']
            });

            console.log(`Created issue #${issue.data.number}`);

      - name: Create Release Draft
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          token: ${{ github.token }}
          draft: true
          name: ${{ github.event.inputs.releaseName }}
          body: |
            ## ✨ Enhancements:
            * Feature 1
            * Feature 2

            ## 🐞 Bug fixes
            * Fix 1
            * Fix 2

            ## 💻 Development
            * Development experience related change 1
            * Development experience related change 2

            ## 📖 Documentation
            * Docs change 1
            * Docs change 2

            <!-- end-release-notes -->
            **Container image:** :whale:  [ghcr.io/headlamp-k8s/headlamp:v${{ github.event.inputs.releaseName }}](https://github.com/kubernetes-sigs/headlamp/pkgs/container/headlamp)
            **Desktop Apps:**

            :penguin:  [Flatpak / Linux (AMD64)](https://flathub.org/apps/details/io.kinvolk.Headlamp)
            :penguin:  Linux AppImage [AMD64](https://github.com/kubernetes-sigs/headlamp/releases/download/v${{ github.event.inputs.releaseName }}/Headlamp-${{ github.event.inputs.releaseName }}-linux-x64.AppImage), [ARM64](https://github.com/kubernetes-sigs/headlamp/releases/download/v${{ github.event.inputs.releaseName }}/Headlamp-${{ github.event.inputs.releaseName }}-linux-arm64.AppImage),  [ARMv7l](https://github.com/kubernetes-sigs/headlamp/releases/download/v${{ github.event.inputs.releaseName }}/Headlamp-${{ github.event.inputs.releaseName }}-linux-armv7l.AppImage)
            :penguin: Linux Tarball [AMD64](https://github.com/kubernetes-sigs/headlamp/releases/download/v${{ github.event.inputs.releaseName }}/Headlamp-${{ github.event.inputs.releaseName }}-linux-x64.tar.gz), [ARM64](https://github.com/kubernetes-sigs/headlamp/releases/download/v${{ github.event.inputs.releaseName }}/Headlamp-${{ github.event.inputs.releaseName }}-linux-arm64.tar.gz), [ARMv7l](https://github.com/kubernetes-sigs/headlamp/releases/download/v${{ github.event.inputs.releaseName }}/Headlamp-${{ github.event.inputs.releaseName }}-linux-armv7l.tar.gz)
            :penguin: Debian / Linux [AMD64](https://github.com/kubernetes-sigs/headlamp/releases/download/v${{ github.event.inputs.releaseName }}/headlamp_${{ github.event.inputs.releaseName }}-1_amd64.deb)
            :green_apple:  [Mac (AMD64)](https://github.com/kubernetes-sigs/headlamp/releases/download/v${{ github.event.inputs.releaseName }}/Headlamp-${{ github.event.inputs.releaseName }}-mac-x64.dmg)
            :green_apple: [Mac (ARM/M1)](https://github.com/kubernetes-sigs/headlamp/releases/download/v${{ github.event.inputs.releaseName }}/Headlamp-${{ github.event.inputs.releaseName }}-mac-arm64.dmg)
            :blue_square:  [Windows (AMD64)](https://github.com/kubernetes-sigs/headlamp/releases/download/v${{ github.event.inputs.releaseName }}/Headlamp-${{ github.event.inputs.releaseName }}-win-x64.exe)
        env:
          GITHUB_REPOSITORY: $GITHUB_REPOSITORY
