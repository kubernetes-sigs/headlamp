[[IgnoredVulns]]
id = "GO-2026-5064"
reason = "containerd is an indirect dependency pulled in only via helm.sh/helm/v3/pkg/registry as an OCI registry client for chart pull/push. Headlamp never runs containerd's CRI plugin, which is what this CVE affects. The 1.7.x fix for this specific advisory (GHSA-xhf5-7wjv-pqxp) is already included in the pinned v1.7.33."

[[IgnoredVulns]]
id = "GO-2026-5338"
reason = "containerd is an indirect dependency pulled in only via helm.sh/helm/v3/pkg/registry as an OCI registry client. This CVE affects containerd's CRI checkpoint-restore feature, which Headlamp never invokes. No fix exists in the 1.7.x line as of this writing; only containerd 2.1.9+/2.2.5+/2.3.2+ are patched, and moving to containerd v2 is out of scope for an indirect dependency of Helm's registry client."

[[IgnoredVulns]]
id = "GO-2026-5622"
reason = "containerd is an indirect dependency pulled in only via helm.sh/helm/v3/pkg/registry as an OCI registry client. Headlamp does not run containerd's CRI plugin or any of the affected checkpoint-restore/CDI code paths."

[[IgnoredVulns]]
id = "GHSA-fxhp-mv3v-67qp"
reason = "No fix is available upstream yet for this oras-go tar-extraction hardlink/symlink escape (confirmed via the GitHub advisory). oras-go is an indirect dependency used only by helm.sh/helm/v3/pkg/registry to pull OCI-packaged Helm charts; Headlamp does not use oras-go's local tar extraction path directly."

[[IgnoredVulns]]
id = "GO-2026-4970"
reason = "Fixed only in Go 1.26.5. CI (Docker builds, ppc64le, s390x) pins the toolchain to 1.26.4 with GOTOOLCHAIN=local for reproducible builds without network fetches. Bumping to 1.26.5 requires updating CI's Go install step across all workflows, which is out of scope for this PR. Tracked as a follow-up."

