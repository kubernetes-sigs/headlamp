apiVersion: v1
kind: Config
clusters:
  - name: cluster1
    cluster:
      server: https://cluster1.example.invalid
  - name: cluster2
    cluster:
      server: https://cluster2.example.invalid
contexts:
  - name: cluster1
    context:
      cluster: cluster1
      user: cluster1-user
  - name: cluster2
    context:
      cluster: cluster2
      user: cluster2-user
users:
  - name: cluster1-user
    user:
      token: cluster1-token
  - name: cluster2-user
    user:
      token: cluster2-token
current-context: cluster1
